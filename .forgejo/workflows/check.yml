name: flake checks

on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: nix-ci
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
      - name: Check formatting
        run: alejandra --check .
      - name: Run Statix
        run: statix check .
      - name: Find dead Nix code
        run: deadnix --fail .
      - name: Check flake
        run: nix flake check --no-write-lock-file
